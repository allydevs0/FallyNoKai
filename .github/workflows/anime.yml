name: Dart / Flutter iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Checar o repositório
      - name: Checkout repository
        uses: actions/checkout@v3

      # Passo 2: Configurar Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      # Passo 3: Instalar dependências
      - name: Get Flutter dependencies
        run: flutter pub get

      # Passo 4: Rodar testes (opcional)
      - name: Run tests
        run: flutter test

      # Passo 5: Gerar IPA não assinado via Expo-Unsigned-IPA
      - name: Build unsigned IPA
        uses: gamekiller2048/Expo-Unsigned-IPA@v1
        with:
          PROJECT_NAME: 'Anime'     # Substitua pelo nome do seu projeto
          CLEAR_CACHE: false         # true se quiser limpar cache anterior

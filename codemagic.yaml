workflows:
  ios-release-nosign:
    name: iOS Release (No Sign)
    environment:
      flutter: stable
      xcode: 16.4
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          pod install --project-directory=ios
      - name: Build iOS Release (No Sign)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa

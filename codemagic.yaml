workflows:
  ios-workflow:
    name: iOS Build (Simulador e Dispositivo)
    environment:
      flutter: stable
      xcode: 16.4
      cocoapods: default
      java: 17
      node: latest
    scripts:
      - name: Switch Xcode
        script: sudo xcode-select --switch /Applications/Xcode-16.4.app/Contents/Developer
      - name: Install dependencies
        script: |
          flutter pub get
          pod install --project-directory=ios
      - name: Build iOS for simulator
        script: flutter build ios --simulator --no-codesign --release
      - name: Build iOS for device
        script: flutter build ios --release
    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/iphonesimulator/Runner.app

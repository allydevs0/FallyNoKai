workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 16.4
      cocoapods: default
      groups:
        - codemagic-signing
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates --certificate-password $CM_CERTIFICATE_PASSWORD
          keychain use-login
      - name: Install dependencies
        script: |
          flutter pub get
          pod install --project-directory=ios
      - name: Build iOS
        script: flutter build ios --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      - provider: ios-app-store

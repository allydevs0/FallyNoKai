workflows:
  ios-release-nosign:
    name: iOS Release (No Sign)
    environment:
      flutter: stable
      xcode: 16.4
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          pod install --project-directory=ios
      - name: Build iOS Release (No Sign)
        script: |
          # Build sem código de assinatura
          flutter build ios --release --no-codesign

          # Cria pasta de artifacts
          mkdir -p build/ios/ipa

          # Converte .app para .ipa (zip)
          APP_DIR="build/ios/Release-iphoneos"
          for app in "$APP_DIR"/*.app; do
            app_name=$(basename "$app" .app)
            zip -r "build/ios/ipa/${app_name}.ipa" "$app"
          done
    artifacts:
      - build/ios/ipa/*.ipa
